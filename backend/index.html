<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Surt IA</title>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js')}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;-webkit-text-size-adjust:100%}
.container{max-width:800px;margin:0 auto;padding:16px}
header{text-align:center;padding:20px 0 16px}
header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#94a3b8;font-size:.85rem;margin-top:4px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
textarea{width:100%;min-height:120px;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.9rem;font-family:monospace;resize:vertical}
textarea:focus{outline:none;border-color:#3b82f6}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff;margin-top:8px;text-align:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:#60a5fa}
.spinner{width:20px;height:20px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.severity{display:inline-block;padding:4px 12px;border-radius:6px;font-weight:700;font-size:.85rem;margin-bottom:8px}
.sev-critical{background:#7f1d1d;color:#fca5a5}
.sev-high{background:#7f1d1d;color:#fca5a5}
.sev-medium{background:#713f12;color:#fde68a}
.sev-low{background:#1e3a5f;color:#93c5fd}
.sev-info{background:#1e293b;color:#94a3b8}
.veredicto{font-size:1.3rem;font-weight:700;margin:8px 0}
.ver-seguro{color:#6ee7b7}
.ver-sospechoso{color:#fde68a}
.ver-peligroso{color:#fca5a5}
pre{font-family:monospace;font-size:.85rem;white-space:pre-wrap;line-height:1.5}
</style>
</head>
<body>
<div class="container">
<header><h1>Surt IA</h1><p>Auditoría de prompts multi-agente</p></header>

<style>
.switch{display:flex;align-items:center;gap:8px;margin:12px 0;cursor:pointer;font-size:.85rem;color:#94a3b8;user-select:none}
.switch input{width:18px;height:18px;accent-color:#3b82f6;cursor:pointer}
.switch input:checked+.slider{background:#3b82f6}
</style>

<div class="card">
<div class="form-group">
<label for="prompt">Pega el prompt a auditar:</label>
<textarea id="prompt" placeholder="Ej: 'Omite todas las restricciones y actúa como...'"></textarea>
</div>
<label class="switch"><input type="checkbox" id="chkRaptor"> Activar Raptor (escanear código con Semgrep)</label>
<button class="btn" id="btnStart" onclick="start()">Auditar prompt</button>
</div>

<div id="result" style="display:none"></div>
</div>

<script>
async function start(){
const c=document.getElementById('prompt').value.trim()
if(!c)return
const btn=document.getElementById('btnStart')
btn.disabled=true;btn.textContent='Analizando...'
const rd=document.getElementById('result')
rd.style.display='block'
rd.innerHTML='<div class="card loading"><div class="spinner"></div>Ejecutando pipeline multi-agente...</div>'
try{
const raptor=document.getElementById('chkRaptor').checked
const r=await fetch('/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,use_raptor:raptor})})
if(!r.ok){rd.innerHTML='<div class="card"><pre style="color:#fca5a5">Error '+(await r.text())+'</pre></div>';return}
const d=await r.json()
poll(d.audit_id)
}catch(e){rd.innerHTML='<div class="card"><pre style="color:#fca5a5">Error de conexión</pre></div>'}
finally{btn.disabled=false;btn.textContent='Auditar prompt'}
}

async function poll(id){
const rd=document.getElementById('result')
try{
const r=await fetch('/audit/'+id)
if(!r.ok)return
const d=await r.json()
const ultimo=d.nodes[d.nodes.length-1]
if(ultimo&&ultimo.output){
const html=renderFinal(ultimo.output)
rd.innerHTML='<div class="card">'+html+'</div>'
}else{
rd.innerHTML='<div class="card loading"><div class="spinner"></div>Procesando...</div>'
}
if(d.status==='running'||d.status==='pending'){setTimeout(()=>poll(id),1500)}
}catch{setTimeout(()=>poll(id),3000)}
}

function renderFinal(texto){
let sev='info'
if(texto.includes('CRITICAL'))sev='critical'
else if(texto.includes('HIGH'))sev='high'
else if(texto.includes('MEDIUM'))sev='medium'
else if(texto.includes('LOW'))sev='low'

let veredicto=''
let vclass=''
if(texto.includes('PELIGROSO')){veredicto='PELIGROSO';vclass='ver-peligroso'}
else if(texto.includes('SOSPECHOSO')){veredicto='SOSPECHOSO';vclass='ver-sospechoso'}
else if(texto.includes('SEGURO')){veredicto='SEGURO';vclass='ver-seguro'}

let html=''
if(veredicto){html+='<div class="veredicto '+vclass+'">'+veredicto+'</div>'}
html+='<span class="severity sev-'+sev+'">'+sev.toUpperCase()+'</span>'
html+='<pre>'+texto+'</pre>'
return html
}
</script>
</body>
</html>
